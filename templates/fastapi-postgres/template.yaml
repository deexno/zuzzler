name: FastAPI Postgres
slug: fastapi-postgres
description: Build and publish a FastAPI image with PostgreSQL in the generated compose file.
questions:
  - id: project_name
    prompt: Project name
    default_from: source_dir_name
  - id: image_name
    prompt: Image name
    default_from: normalized_project_name
  - id: image_tag
    prompt: Image tag
    default: latest
  - id: python_version
    prompt: Python version
    default: "3.12"
  - id: requirements_file
    prompt: Requirements file path inside the project
    default: requirements.txt
  - id: container_name
    prompt: App container name
    default_from: normalized_project_name
  - id: db_container_name
    prompt: Database container name
    default: postgres
  - id: app_port
    prompt: Public port
    default: "8000"
  - id: internal_port
    prompt: Container port
    default: "8000"
  - id: postgres_db
    prompt: Postgres database name
    default: app
  - id: postgres_user
    prompt: Postgres user
    default: app
  - id: postgres_password
    prompt: Postgres password
    default: changeme
  - id: startup_command
    prompt: Startup command
    default: uvicorn main:app --host 0.0.0.0 --port 8000
files:
  - source: Dockerfile.tmpl
    target: Dockerfile
  - source: compose.yml.tmpl
    target: compose.yml
  - source: .dockerignore.tmpl
    target: .dockerignore
  - source: entrypoint.sh.tmpl
    target: entrypoint.sh
